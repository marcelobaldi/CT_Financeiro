<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Despesas</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #ffffff; padding-top: 30px; }
        .card { background-color: #1e1e1e; border: 1px solid #333; border-radius: 15px; }
        .form-label { color: #aaa; font-weight: 600; }
        input, select { background-color: #2d2d2d !important; color: #fff !important; border: 1px solid #444 !important; }
        .btn-success { background-color: #107c41; border: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
            <div class="card p-4">
                <h3 class="text-center mb-4" style="color: #107c41;">Nova Despesa</h3>
                <form id="formDespesa">
                    <div class="mb-3">
                        <label for="txtData" class="form-label">Data da Despesa</label>
                        <input type="date" class="form-control" id="txtData" required>
                    </div>
                    <div class="mb-3">
                        <label for="txtValor" class="form-label">Valor Total (R$)</label>
                        <input type="number" step="0.01" class="form-control" id="txtValor" placeholder="0,00" required>
                    </div>
                    <div class="mb-4">
                        <label for="cmbForma" class="form-label">Forma de Pagamento</label>
                        <select class="form-select" id="cmbForma" required>
                            <option value="" disabled selected>Selecione...</option>
                            <option value="1_A Vista">1_A Vista</option>
                            <option value="2_A Prazo">2_A Prazo</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-success w-100 p-2 fs-5">Salvar no Excel</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    // url criada no script.google.com
    const URL_LOGICA = "https://script.google.com/macros/s/AKfycbxyXqivv3nVEnKQVjbkX_DBtlAdal4anZdJsOiMQ4DfHGtyi_l1GTdI4hnOHpVF9xiC/exec"; 

    document.getElementById('formDespesa').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const dataOriginal = document.getElementById('txtData').value; 
        const valor = document.getElementById('txtValor').value;
        const forma = document.getElementById('cmbForma').value;

        const partes = dataOriginal.split('-'); 
        const dataFormatada = partes[2] + "/" + partes[1] + "/" + partes[0]; // dd/mm/yyyy

        // Envia os dados como texto puro para evitar bloqueios de CORS do navegador
               // Envia os dados de forma legítima como texto puro (contorna o bloqueio de CORS de forma segura)
        try {
            const response = await fetch(URL_LOGICA, {
                method: "POST",
                headers: { "Content-Type": "text/plain" }, // Força o formato de texto para aceitar no HD e no Celular
                body: JSON.stringify({ data: dataFormatada, valor: valor, forma: forma })
            });

            alert("Lançamento enviado! Verifique sua planilha.");
            document.getElementById('txtValor').value = "";
            document.getElementById('cmbForma').selectedIndex = 0;
        } catch (error) {
            alert("Falha ao conectar com o servidor.");
        }
    });
</script>
</body>
</html>
